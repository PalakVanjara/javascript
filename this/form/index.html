<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-gradient-to-br from-blue-300 via-purple-400 to-pink-200 min-h-screen min-w-full">
    
        <form class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-8 mb-12 w-full mx-auto mt-10 max-w-lg border border-blue-100 ">
            <h2 class="text-center text-3xl font-semibold mb-6 txet-blue-600">Add User</h2>
            <div class="mb-5 ">
                <label class="block text-gray-400 font-medium mb-2" for="name">Name:</label>
                <input class="outline-none w-full px-4 py-2 border-blue-200 border rounded-xl focus:ring-2 focus:ring-blue-300 transition " type="text" name="name" placeholder="name" />
            </div>
            <div class="mb-5 ">
                <label class="block text-gray-400 font-medium mb-2" for="role">Role:</label>
                <input class="outline-none w-full px-4 py-2 border-blue-200 border rounded-xl focus:ring-2 focus:ring-blue-300 transition " type="text" name="role" placeholder="role" />
            </div>
            <div class="mb-5 ">
                <label class="block text-gray-400 font-medium mb-2" for="bio">Bio:</label>
                <input class="outline-none w-full px-4 py-2 border-blue-200 border rounded-xl focus:ring-2 focus:ring-blue-300 transition " type="text" name="bio" placeholder="bio" />
            </div>
            <div class="mb-5 ">
                <label class="block text-gray-400 font-medium mb-2" for="photourl">Photo Url:</label>
                <input class="outline-none w-full px-4 py-2 border-blue-200 border rounded-xl focus:ring-2 focus:ring-blue-300 transition " type="text" name="img" placeholder="Img" />
            </div>
          <button class="">Create Card</button>
        </form>

</body>
</html>
