<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create A Card</title>
    <!-- tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="bg-gradient-to-br from-blue-100 via-purple-100 to-pink-100 min-h-screen"
  >
    <form autocomplete="off"
      class="bg-white/90 backdrop-blur rounded-2xl p-8 mb-12 w-full max-w-lg mx-auto mt-10 border border-blue-100"
    >
      <h1 class="text-center text-5xl text-blue-950 mb-5 font-semibold">
        Add User
      </h1>
      <div class="mb-5">
        <label class="text-gray-500 mb-2 font-medium block" for="name"
          >Name</label
        >
        <input
          required
          minlength="2"
          class="outline-none focus:outline-none border border-blue-100 px-4 py-2 w-full rounded-lg focus:ring-2 focus:ring-blue-400"
          type="text"
          name="name"
          placeholder="Give your Name"
        />
      </div>
      <div class="mb-5">
        <label class="text-gray-500 mb-2 font-medium block" for="name"
          >Role</label
        >
        <input
          required
          minlength="2"
          class="outline-none focus:outline-none border border-blue-100 px-4 py-2 w-full rounded-lg focus:ring-2 focus:ring-blue-400"
          type="text"
          name="role"
          placeholder="Enter Your Role"
        />
      </div>
      <div class="mb-5">
        <label class="text-gray-500 mb-2 font-medium block" for="name"
          >Bio</label
        >
        <input
          required
          minlength="2"
          class="outline-none focus:outline-none border border-blue-100 px-4 py-2 w-full rounded-lg focus:ring-2 focus:ring-blue-400"
          type="text"
          name="bio"
          placeholder="Write Somthing About you........"
        />
      </div>
      <div class="mb-5">
        <label class="text-gray-500 mb-2 font-medium block" for="name"
          >Image URL</label
        >
        <input
          required
          minlength="2"
          class="outline-none focus:outline-none border border-blue-100 px-4 py-2 w-full rounded-lg focus:ring-2 focus:ring-blue-400"
          type="text"
          name="img"
          placeholder="place you image url here"
        />
      </div>

      <button
        class="w-full bg-gradient-to-br from-blue-600 to-purple-600 hover:from-purple-600 hover:to-blue-600 transition text-white py-4 font-semibold shadow-lg rounded-lg hover:shadow-2x text-xl"
      >
        Create Card
      </button>
    </form>

  <div class="users grid gird-cols-1 md:gird-cols-3">
  </div>

    <script src="script.js"></script>
  </body>
</html>
